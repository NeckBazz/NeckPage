<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeckBazz</title>

<style>

body{
background:black;
color:white;
font-family:Arial, sans-serif;
text-align:center;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
margin:0;
}

.toptext{
position:absolute;
top:40px;
font-size:22px;
}

h1{
font-size:80px;
margin-top:70px;
margin-bottom:30px;
animation:fadeColor 6s infinite alternate;
}

@keyframes fadeColor{
0%{color:white;}
100%{color:#888;}
}

.botones{
display:flex;
flex-direction:column;
gap:25px;
margin-top:10px;
}

.boton{
display:flex;
align-items:center;
justify-content:center;
width:260px;
height:90px;
border-radius:14px;
border:2px solid white;
transition:transform 0.2s;
}

.boton:hover{
transform:scale(1.07);
}

.icono{
height:50px;
}

/* YouTube */

.youtube{
background:white;
}

/* TikTok */

.tiktok{
background:black;
}

</style>
</head>

<body>

<div class="toptext">gracias por apoyar el canal</div>

<h1>NeckBazz</h1>

<div class="botones">

<a class="boton youtube" href="https://www.youtube.com/@Neckbazz" target="_blank">
<img class="icono" src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg">
</a>

<a class="boton tiktok" href="https://www.tiktok.com/@neckbazzyts?_r=1&_t=ZS-94WwpRtQ9n5" target="_blank">
<img class="icono" src="tiktok.png">
</a>

</div>

</body>
</html>
